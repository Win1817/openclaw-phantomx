---
# ServiceMonitor: tells Prometheus Operator to scrape the gateway /metrics endpoint.
# Requires: prometheus-operator (kube-prometheus-stack Helm chart)
#
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: openclaw-gateway
  namespace: openclaw
  labels:
    # Match the Prometheus Operator's serviceMonitorSelector labels
    app.kubernetes.io/name: openclaw-gateway
    app.kubernetes.io/component: monitoring
    release: kube-prometheus-stack   # change to match your Prometheus release name
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw-gateway
      app.kubernetes.io/component: gateway
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: false
  namespaceSelector:
    matchNames:
      - openclaw

---
# ServiceMonitor for Redis exporter
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-exporter
  namespace: openclaw
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: monitoring
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/component: event-bus
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
  namespaceSelector:
    matchNames:
      - openclaw

---
# ServiceMonitor for NATS exporter
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
