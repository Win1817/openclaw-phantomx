---
# kustomization.yaml
# Apply the entire OpenClaw × Rocket.Chat stack with:
#
#   kubectl apply -k k8s/
#
# Or per-environment overlays (see k8s/overlays/ pattern):
#   kubectl apply -k k8s/overlays/production/
#
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openclaw

resources:
  # Namespace + RBAC (must come first)
  - rocketchat/namespace.yaml

  # Infra: event buses
  - infra/redis.yaml
  - infra/nats.yaml

  # Gateway: config, secrets template, deployment, service, ingress, HPA
  - rocketchat/configmap.yaml
  - rocketchat/secrets.yaml
  - rocketchat/deployment.yaml
  - rocketchat/service.yaml
  - rocketchat/ingress.yaml
  - rocketchat/hpa.yaml
  - rocketchat/network-policy.yaml

  # Observability
  - monitoring/service-monitor.yaml

commonLabels:
  app.kubernetes.io/part-of: openclaw-phantomx
  app.kubernetes.io/managed-by: kustomize

# Image tag management — override with:
#   kustomize edit set image ghcr.io/win1817/openclaw-phantomx=<tag>
images:
  - name: ghcr.io/win1817/openclaw-phantomx
    newTag: latest
