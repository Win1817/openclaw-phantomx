---
# Deployment: OpenClaw gateway with Rocket.Chat plugin
#
# Design decisions:
#   - Stateless pods — all session state in Redis (or in-memory per session)
#   - RollingUpdate strategy with maxSurge=1 / maxUnavailable=0 for zero-downtime
#   - Resource requests set conservatively; tune via HPA (hpa.yaml)
#   - All secrets injected as env vars — no secret files on disk
#   - securityContext: non-root, read-only root FS, dropped capabilities
#   - Liveness on /healthz, Readiness on /readyz (gateway HTTP endpoints)
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-gateway
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/version: "2026.4.1"
  annotations:
    # kubectl rollout restart deployment/openclaw-gateway -n openclaw
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw-gateway
      app.kubernetes.io/component: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw-gateway
        app.kubernetes.io/component: gateway
        app.kubernetes.io/version: "2026.4.1"
      annotations:
        # Force pod restart when ConfigMap changes (checksum approach)
        checksum/config: "{{ include (print $.Template.BasePath \"/configmap.yaml\") . | sha256sum }}"
        # Prometheus scrape annotations (also covered by ServiceMonitor)
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: openclaw-gateway
      automountServiceAccountToken: false

      # Spread across nodes and AZs for resilience
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: openclaw-gateway
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: openclaw-gateway

      # Graceful shutdown: allow in-flight DDP messages to drain
      terminationGracePeriodSeconds: 30

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: gateway
          image: ghcr.io/win1817/openclaw-phantomx:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

          # ---- Environment: non-sensitive config from ConfigMap -----------
          envFrom:
            - configMapRef:
                name: openclaw-gateway-config

          # ---- Environment: secrets injected individually ----------------
          env:
            # Rocket.Chat bot credentials
            - name: ROCKETCHAT_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: rocketchat-credentials
                  key: ROCKETCHAT_AUTH_TOKEN
            - name: ROCKETCHAT_USER_ID
              valueFrom:
                secretKeyRef:
                  name: rocketchat-credentials
                  key: ROCKETCHAT_USER_ID

            # Redis event bus password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_PASSWORD
                  optional: true

            # Redis URL (constructed in entrypoint, or set directly)
            - name: ROCKETCHAT_EVENT_BUS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-master.openclaw.svc.cluster.local:6379"

            # AI provider keys
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-ai-credentials
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-ai-credentials
                  key: OPENAI_API_KEY
                  optional: true

            # Pod identity (useful for logging / tracing)
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          # ---- Health probes ---------------------------------------------
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24  # 2 minutes startup budget

          # ---- Writable temp volumes (read-only FS requires these) -------
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /run
            - name: openclaw-data
              mountPath: /home/openclaw/.openclaw
            - name: plugin-cache
              mountPath: /home/openclaw/.npm

      volumes:
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: openclaw-data
          emptyDir: {}
        - name: plugin-cache
          emptyDir: {}

      # Pull from GHCR
      imagePullSecrets:
        - name: ghcr-credentials
