---
# Secret: sensitive credentials for the Rocket.Chat bot.
#
# ⚠️  DO NOT commit real values here.
#     Use one of:
#       a) External Secrets Operator + Vault / AWS Secrets Manager
#       b) Sealed Secrets (kubeseal)
#       c) kubectl create secret generic (out-of-band)
#
# Template — replace <base64-encoded-value> with:
#   echo -n 'actual-value' | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: rocketchat-credentials
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw-gateway
    app.kubernetes.io/component: credentials
type: Opaque
data:
  # Rocket.Chat bot personal access token
  # Source: Admin > Users > <bot user> > Personal Access Tokens
  ROCKETCHAT_AUTH_TOKEN: <base64-encoded-auth-token>

  # Rocket.Chat bot user ID (_id field from Admin > Users)
  ROCKETCHAT_USER_ID: <base64-encoded-user-id>

---
# Secret: event bus credentials (Redis AUTH password)
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: openclaw
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: credentials
type: Opaque
data:
  # Redis AUTH password (leave empty if Redis runs without auth)
  REDIS_PASSWORD: <base64-encoded-redis-password>

---
# Secret: AI provider API key(s)
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-ai-credentials
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw-gateway
    app.kubernetes.io/component: ai-credentials
type: Opaque
data:
  # Anthropic API key (for Claude agents)
  ANTHROPIC_API_KEY: <base64-encoded-anthropic-key>
  # OpenAI API key (optional, for OpenAI agents)
  OPENAI_API_KEY: <base64-encoded-openai-key>
