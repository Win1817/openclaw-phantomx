---
# NATS JetStream: cloud-native alternative event bus transport.
#
# Use NATS when you need:
#   - Sub-millisecond publish latency (faster than Redis Streams)
#   - Fan-out to multiple consumer groups simultaneously
#   - Edge/IoT connectivity (NATS leafnode to edge devices / UAVs)
#   - Multi-cluster federation
#
# For OpenClaw: switch transport via:
#   ROCKETCHAT_EVENT_BUS_TRANSPORT=nats
#   ROCKETCHAT_EVENT_BUS_URL=nats://nats.openclaw.svc.cluster.local:4222
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: openclaw
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: config
data:
  nats.conf: |
    # Server identity
    server_name: openclaw-nats

    # Client connections
    port: 4222
    max_connections: 10000
    max_payload: 8MB

    # HTTP monitoring (for health checks and Prometheus exporter)
    http_port: 8222

    # JetStream persistence
    jetstream {
      store_dir: /data/jetstream
      max_mem: 1GB
      max_file: 10GB
    }

    # Clustering (single-node here; expand to 3 for HA)
    # cluster {
    #   name: openclaw-cluster
    #   port: 6222
    #   routes: [
    #     nats-route://nats-0.nats-headless:6222
    #     nats-route://nats-1.nats-headless:6222
    #     nats-route://nats-2.nats-headless:6222
    #   ]
    # }

    # Account system (disable for single-tenant)
    no_auth_user: openclaw

    # Logging
    log_time: true
    debug: false
    trace: false

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: openclaw
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: event-bus
spec:
  serviceName: nats-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
      app.kubernetes.io/component: event-bus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
        app.kubernetes.io/component: event-bus
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7777"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: nats
          image: nats:2.10-alpine
          args:
            - -c
            - /etc/nats/nats.conf
          ports:
            - name: client
              containerPort: 4222
            - name: cluster
              containerPort: 6222
            - name: monitor
              containerPort: 8222

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # JetStream needs to write
            capabilities:
              drop: ["ALL"]

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"

          livenessProbe:
            httpGet:
              path: /healthz
              port: monitor
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /readyz
              port: monitor
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3

          volumeMounts:
            - name: nats-config
              mountPath: /etc/nats
              readOnly: true
            - name: nats-data
              mountPath: /data

        # Prometheus NATS exporter sidecar
        - name: nats-exporter
          image: natsio/prometheus-nats-exporter:0.14.0
          args:
            - -varz
            - -jsz=all
            - -port=7777
            - http://localhost:8222
          ports:
            - name: metrics
              containerPort: 7777
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

      volumes:
        - name: nats-config
          configMap:
            name: nats-config

  volumeClaimTemplates:
    - metadata:
        name: nats-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: nats-headless
  namespace: openclaw
  labels:
    app.kubernetes.io/name: nats
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: event-bus
  ports:
    - name: client
      port: 4222
    - name: cluster
      port: 6222
    - name: monitor
      port: 8222

---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: openclaw
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: event-bus
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: event-bus
  ports:
    - name: client
      port: 4222
      targetPort: client
    - name: metrics
      port: 7777
      targetPort: metrics
